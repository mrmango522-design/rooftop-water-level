<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天台積水監察</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 透視與格線樣式 */
        #scene-container { perspective: 1000px; }

        #iso-grid {
            transform: rotateX(60deg) rotateZ(135deg); /* 旋轉180度: 原本為 -45deg，改為 135deg */
            transform-style: preserve-3d;
            box-shadow: 15px -15px 20px rgba(0,0,0,0.4); /* 配合旋轉反轉陰影方向 */
        }

        .iso-cell {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
            background-color: #9ca3af; /* 預設灰底 */
        }

        .cursor-pouring #iso-grid { cursor: crosshair; }
        .cursor-pouring .iso-cell:hover { opacity: 0.8; }

        /* 去水渠位樣式 */
        .drain-hole {
            width: 14px;
            height: 14px;
            background-color: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.9);
            z-index: 10;
        }

        /* 3D 座標標籤 (抵消旋轉使其正向面對鏡頭) */
        .coord-label {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 4px;
            transform: translate(-50%, -50%) rotateZ(-135deg) rotateX(-60deg); /* 抵消 135deg 旋轉 */
            pointer-events: none;
            z-index: 20;
            top: 50%; left: 50%;
            white-space: nowrap;
        }

        /* ================= 3D 真實積水效果 ================= */
        .water-layer {
            position: absolute;
            inset: 0;
            opacity: 0;
            background-color: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0px);
            pointer-events: none;
        }

        /* 小量積水 */
        .iso-cell.level-1 .water-layer {
            opacity: 0.7;
            background-color: #3b82f6; 
            transform: translateZ(2px);
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.4);
            animation: water-ripple 3s infinite alternate ease-in-out;
        }

        /* 大量積水 */
        .iso-cell.level-2 .water-layer {
            opacity: 0.85;
            background-color: #1d4ed8; 
            transform: translateZ(6px);
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.3);
            animation: water-ripple 2.5s infinite alternate ease-in-out;
        }

        @keyframes water-ripple {
            0% { opacity: 0.6; }
            100% { opacity: 0.85; }
        }

        /* ================= 動畫特效 ================= */
        .water-drop {
            position: fixed;
            width: 8px; height: 16px;
            background-color: #3b82f6;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            pointer-events: none; z-index: 50;
            animation: drop-fall 0.25s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        .water-splash {
            position: fixed;
            width: 20px; height: 10px;
            background: transparent;
            border: 2px solid #60a5fa; border-radius: 50%;
            pointer-events: none; z-index: 50;
            transform: translate(-50%, -50%);
            animation: splash-anim 0.4s ease-out forwards;
        }

        @keyframes drop-fall {
            0% { transform: translateY(-60px) scaleY(1.2); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(0) scaleY(1); opacity: 1; }
        }
        @keyframes splash-anim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; border-width: 3px; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; border-width: 0px; }
        }

        .global-rain-drop {
            position: absolute; top: -20px;
            width: 2px; height: 15px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(100,150,255,0.8));
            pointer-events: none; z-index: 40;
            animation: global-fall linear forwards;
        }
        @keyframes global-fall { to { transform: translateY(420px); } }

        /* 平面圖顏色 */
        .top-cell.level-0 { background-color: #d3d3d3 !important; }
        .top-cell.level-1 { background-color: #ffeb3b !important; }
        .top-cell.level-2 { background-color: #f44336 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800 min-h-screen flex flex-col items-center py-8">

    <h1 class="text-3xl font-bold mb-4 text-slate-700">天台積水監察</h1>
    
    <!-- 頂部控制列 (模式選擇 & 連線按鈕) -->
    <div class="flex items-center gap-4 mb-6">
        <select id="mode-selector" class="bg-white border-2 border-slate-300 text-slate-700 font-bold py-2 px-4 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer h-[44px]">
            <option value="roof">模擬天台</option>
            <option value="single">單塊地板</option>
        </select>

        <button id="connect-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 rounded-lg shadow-md transition duration-300 h-[44px] flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
            </svg>
            連接 Micro:bit (Serial)
        </button>
    </div>

    <!-- ================= 模式 1：模擬天台 (Roof Mode) ================= -->
    <div id="roof-mode-container" class="flex flex-col items-center w-full">
        <!-- 天台互動場景 -->
        <div id="scene-container" class="relative w-[600px] h-[400px] bg-gradient-to-b from-sky-300 to-sky-100 border-2 border-slate-300 rounded-xl overflow-hidden shadow-lg mb-8">
            
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                <div id="iso-grid" class="grid grid-cols-10 grid-rows-10 border-2 border-gray-600 bg-gray-500">
                    <!-- 方格將由 JS 生成 -->
                </div>
            </div>

            <!-- 左下角控制區 -->
            <div class="absolute bottom-4 left-4 flex flex-col items-start gap-2 z-10">
                <div class="flex items-center gap-2 bg-white/90 p-2 rounded-lg shadow-sm border border-slate-200">
                    <select id="rain-type" class="bg-white border border-blue-300 text-blue-700 text-sm font-bold px-2 py-1.5 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer">
                        <option value="1">微雨 (黃)</option>
                        <option value="2">大雨 (紅)</option>
                    </select>
                    <button id="rain-btn" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold px-3 py-1.5 rounded transition-colors flex items-center gap-1 shadow-sm">
                        <span>🌧️</span> <span>開始下雨</span>
                    </button>
                </div>
                <!-- 還原清除按鈕 -->
                <button id="reset-btn" class="bg-red-50 hover:bg-red-100 border border-red-300 text-red-600 text-sm font-bold px-3 py-1.5 rounded transition-colors flex items-center gap-1 shadow-sm">
                    <span>↺</span> <span>還原清除</span>
                </button>
            </div>

            <!-- 右下角工具區 -->
            <div class="absolute bottom-4 right-4 flex flex-col items-end gap-3 z-10">
                <div id="size-selector" class="hidden flex-col items-end gap-1 opacity-0 transition-opacity duration-300">
                    <label for="pour-size" class="text-xs font-bold text-slate-600 bg-white/90 px-2 py-1 rounded shadow-sm">💧 倒水範圍</label>
                    <select id="pour-size" class="bg-white border-2 border-blue-400 text-blue-700 font-bold px-3 py-1.5 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer transition-all">
                        <option value="1">1 格 (1x1)</option>
                        <option value="2">4 格 (2x2)</option>
                        <option value="3">9 格 (3x3)</option>
                        <option value="4">16 格 (4x4)</option>
                    </select>
                </div>
                <button id="bucket-tool" class="bg-white border-2 border-gray-300 px-4 py-2 rounded-lg font-bold shadow-sm hover:shadow-md transition-all select-none flex items-center gap-2">
                    <span>🪣</span> <span>水桶 (關)</span>
                </button>
            </div>
        </div>

        <!-- 平面監控圖 (加入座標軸) -->
        <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200 flex flex-col items-center">
            <h2 class="text-xl font-bold mb-4 text-slate-700">平面圖 (Top View)</h2>
            
            <div class="flex items-start">
                <!-- Y軸標示 -->
                <div class="flex flex-col justify-between text-xs font-mono font-bold text-slate-400 mr-2 h-[268px] py-[4px]">
                    <span>9</span><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span>
                </div>
                
                <!-- 網格本體 -->
                <div>
                    <div id="top-grid" class="grid grid-cols-10 grid-rows-10 gap-[2px] bg-gray-700 p-1 rounded-md shadow-inner relative">
                        <!-- 方格將由 JS 生成 -->
                    </div>
                    <!-- X軸標示 -->
                    <div class="flex justify-between text-xs font-mono font-bold text-slate-400 mt-2 px-[4px] w-[268px]">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-5 flex gap-4 text-sm font-medium text-slate-600">
                <div class="flex items-center gap-1"><div class="w-4 h-4 bg-[#d3d3d3] rounded-sm border border-gray-300"></div>無水</div>
                <div class="flex items-center gap-1"><div class="w-4 h-4 bg-[#ffeb3b] rounded-sm border border-gray-300"></div>小量積水</div>
                <div class="flex items-center gap-1"><div class="w-4 h-4 bg-[#f44336] rounded-sm border border-gray-300"></div>大量積水</div>
                <div class="flex items-center gap-1 ml-2"><div class="w-4 h-4 bg-[#1a1a1a] rounded-full shadow-sm"></div>去水口</div>
            </div>
        </div>
    </div>

    <!-- ================= 模式 2：單塊地板 (Single Mode) ================= -->
    <div id="single-mode-container" class="hidden flex-col items-center w-full">
        <!-- 單一塊大場景 -->
        <div class="relative w-[600px] h-[350px] bg-gradient-to-b from-sky-300 to-sky-100 border-2 border-slate-300 rounded-xl overflow-hidden shadow-lg mb-6 flex justify-center items-center" style="perspective: 1000px;">
            <div id="single-tile" class="iso-cell level-0 w-[150px] h-[150px] border-4 border-white/50 box-border transition-all duration-500" style="transform: rotateX(60deg) rotateZ(135deg); transform-style: preserve-3d; box-shadow: 25px -25px 35px rgba(0,0,0,0.4);">
                <div class="water-layer"></div>
            </div>
        </div>
        
        <!-- 狀態列 -->
        <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200 w-[600px] text-center flex flex-col items-center">
            <h2 class="text-xl font-bold mb-4 text-slate-700">Micro:bit 接收狀態</h2>
            <div id="single-status" class="w-full text-2xl font-mono font-bold text-slate-500 bg-slate-100 py-4 rounded-lg border border-slate-200 transition-colors duration-300">
                等待訊號... (預設: Low)
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 10;
        let waterLevels = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let bucketActive = false;
        let currentMode = 'roof';

        // 模式切換 DOM
        const modeSelector = document.getElementById('mode-selector');
        const roofModeContainer = document.getElementById('roof-mode-container');
        const singleModeContainer = document.getElementById('single-mode-container');
        const singleTile = document.getElementById('single-tile');
        const singleStatus = document.getElementById('single-status');

        // 模擬天台 DOM
        const isoGrid = document.getElementById('iso-grid');
        const topGrid = document.getElementById('top-grid');
        const bucketTool = document.getElementById('bucket-tool');
        const sceneContainer = document.getElementById('scene-container');
        const rainBtn = document.getElementById('rain-btn');
        const rainType = document.getElementById('rain-type');
        const resetBtn = document.getElementById('reset-btn');

        let isRaining = false;
        let rainInterval;
        let drainInterval; 

        // ==========================================
        // 模式切換邏輯
        // ==========================================
        modeSelector.addEventListener('change', (e) => {
            currentMode = e.target.value;
            if (currentMode === 'roof') {
                roofModeContainer.classList.remove('hidden');
                roofModeContainer.classList.add('flex');
                singleModeContainer.classList.add('hidden');
                singleModeContainer.classList.remove('flex');
            } else {
                roofModeContainer.classList.add('hidden');
                roofModeContainer.classList.remove('flex');
                singleModeContainer.classList.remove('hidden');
                singleModeContainer.classList.add('flex');
            }
        });

        // ==========================================
        // 網格初始化 (天台模式)
        // ==========================================
        function initGrids() {
            isoGrid.innerHTML = '';
            topGrid.innerHTML = '';

            // 1. 建立 3D 互動天台
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let isoCell = document.createElement('div');
                    isoCell.className = 'iso-cell level-0 w-[30px] h-[30px] border border-white/30 box-border';
                    
                    if (x === 0 && y === 8) {
                        let hole = document.createElement('div');
                        hole.className = 'drain-hole';
                        isoCell.appendChild(hole);
                    }

                    let waterLayer = document.createElement('div');
                    waterLayer.className = 'water-layer';
                    isoCell.appendChild(waterLayer);

                    if ((x===0 && y===0) || (x===9 && y===0) || (x===0 && y===9) || (x===9 && y===9)) {
                        let label = document.createElement('span');
                        label.className = 'coord-label';
                        label.innerText = `(${x},${y})`;
                        isoCell.appendChild(label);
                    }

                    isoCell.addEventListener('click', (e) => handleCellClick(x, y, e));
                    isoGrid.appendChild(isoCell);
                }
            }

            // 2. 建立 Top View 平面圖 
            for (let y = GRID_SIZE - 1; y >= 0; y--) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let topCell = document.createElement('div');
                    topCell.className = 'top-cell level-0 w-[25px] h-[25px] transition-colors duration-300 relative';
                    topCell.id = `top-${x}-${y}`;

                    if (x === 0 && y === 8) {
                        let hole = document.createElement('div');
                        hole.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[10px] h-[10px] bg-gray-900 rounded-full';
                        topCell.appendChild(hole);
                    }

                    topGrid.appendChild(topCell);
                }
            }
        }

        // ==========================================
        // 倒水與 UI 更新 (天台模式)
        // ==========================================
        bucketTool.addEventListener('click', () => {
            bucketActive = !bucketActive;
            const sizeSelector = document.getElementById('size-selector');
            const bucketText = bucketTool.querySelector('span:nth-child(2)');

            if (bucketActive) {
                bucketTool.classList.add('border-blue-500', 'bg-blue-50', 'scale-105', 'text-blue-700');
                bucketText.innerText = '水桶 (開) - 點擊倒水';
                sceneContainer.classList.add('cursor-pouring');
                sizeSelector.classList.remove('hidden');
                sizeSelector.classList.add('flex');
                setTimeout(() => sizeSelector.classList.remove('opacity-0'), 10);
            } else {
                bucketTool.classList.remove('border-blue-500', 'bg-blue-50', 'scale-105', 'text-blue-700');
                bucketText.innerText = '水桶 (關)';
                sceneContainer.classList.remove('cursor-pouring');
                sizeSelector.classList.add('opacity-0');
                setTimeout(() => {
                    sizeSelector.classList.add('hidden');
                    sizeSelector.classList.remove('flex');
                }, 300);
            }
        });

        function createPourAnimation(clientX, clientY) {
            const drop = document.createElement('div');
            drop.className = 'water-drop';
            drop.style.left = `${clientX - 4}px`;
            drop.style.top = `${clientY}px`; 
            document.body.appendChild(drop);
            setTimeout(() => {
                drop.remove();
                const splash = document.createElement('div');
                splash.className = 'water-splash';
                splash.style.left = `${clientX}px`;
                splash.style.top = `${clientY}px`;
                document.body.appendChild(splash);
                setTimeout(() => splash.remove(), 400);
            }, 250);
        }

        function handleCellClick(startX, startY, event) {
            if (!bucketActive) return;
            const pourSize = parseInt(document.getElementById('pour-size').value);
            for (let dy = 0; dy < pourSize; dy++) {
                for (let dx = 0; dx < pourSize; dx++) {
                    let nx = startX + dx; let ny = startY + dy;
                    if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                        let isoIndex = ny * GRID_SIZE + nx;
                        let targetCell = isoGrid.children[isoIndex];
                        let rect = targetCell.getBoundingClientRect();
                        let centerX = rect.left + rect.width / 2;
                        let centerY = rect.top + rect.height / 2;
                        let randomDelay = Math.random() * 100;
                        setTimeout(() => createPourAnimation(centerX, centerY), randomDelay);
                        setTimeout(() => {
                            waterLevels[nx][ny] = (waterLevels[nx][ny] + 1) % 3;
                            updateUI(nx, ny);
                        }, 250 + randomDelay);
                    }
                }
            }
        }

        function updateUI(x, y) {
            let level = waterLevels[x][y];
            let isoIndex = y * GRID_SIZE + x;
            let isoCell = isoGrid.children[isoIndex];
            isoCell.className = isoCell.className.replace(/level-\d/, `level-${level}`);

            let topCell = document.getElementById(`top-${x}-${y}`);
            if (topCell) {
                topCell.className = topCell.className.replace(/level-\d/, `level-${level}`);
            }
        }

        // ==========================================
        // 還原、下雨與 L型退水邏輯 (天台模式)
        // ==========================================
        resetBtn.addEventListener('click', resetAllWater);

        function resetAllWater() {
            if (isRaining) rainBtn.click(); 
            clearInterval(drainInterval); 
            
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    waterLevels[x][y] = 0;
                    updateUI(x, y);
                }
            }
        }

        rainBtn.addEventListener('click', () => {
            isRaining = !isRaining;
            const btnText = rainBtn.querySelector('span:nth-child(2)');

            if (isRaining) {
                clearInterval(drainInterval); 
                rainBtn.classList.replace('bg-blue-500', 'bg-slate-500');
                rainBtn.classList.replace('hover:bg-blue-600', 'hover:bg-slate-600');
                btnText.innerText = '停止下雨';
                
                const level = parseInt(rainType.value);
                rainInterval = setInterval(createGlobalRain, 30); 
                
                setTimeout(() => {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        for (let y = 0; y < GRID_SIZE; y++) {
                            waterLevels[x][y] = level;
                            updateUI(x, y);
                        }
                    }
                }, 800);

            } else {
                rainBtn.classList.replace('bg-slate-500', 'bg-blue-500');
                rainBtn.classList.replace('hover:bg-slate-600', 'hover:bg-blue-600');
                btnText.innerText = '開始下雨';
                clearInterval(rainInterval);
                startDrain();
            }
        });

        function startDrain() {
            clearInterval(drainInterval);
            let currentDrainStep = 0;

            drainInterval = setInterval(() => {
                let hasWaterLeft = false;
                for (let k = 0; k <= 9; k++) {
                    if (currentDrainStep >= k) {
                        for (let x = 0; x <= 9 - k; x++) {
                            if (waterLevels[x][k] > 0) {
                                waterLevels[x][k]--; 
                                updateUI(x, k);
                                hasWaterLeft = true;
                            }
                        }
                        for (let y = k; y <= 9; y++) {
                            if (waterLevels[9 - k][y] > 0) {
                                waterLevels[9 - k][y]--; 
                                updateUI(9 - k, y);
                                hasWaterLeft = true;
                            }
                        }
                    }
                }
                currentDrainStep++;
                if (!hasWaterLeft && currentDrainStep > 9) {
                    clearInterval(drainInterval);
                }
            }, 350); 
        }

        function createGlobalRain() {
            const dropCount = parseInt(rainType.value) === 1 ? 2 : 6; 
            for(let i=0; i<dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'global-rain-drop';
                drop.style.left = `${Math.random() * 100}%`;
                const duration = 0.25 + Math.random() * 0.2;
                drop.style.animationDuration = `${duration}s`;
                drop.style.opacity = 0.4 + Math.random() * 0.6;
                sceneContainer.appendChild(drop);
                setTimeout(() => drop.remove(), duration * 1000);
            }
        }

        // ==========================================
        // Micro:bit Web Serial
        // ==========================================
        let port;
        const connectBtn = document.getElementById('connect-btn');
        connectBtn.addEventListener('click', async () => {
            if (!('serial' in navigator)) { alert("請使用 Chrome 或 Edge 瀏覽器。"); return; }
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                connectBtn.innerText = "✅ Micro:bit 已連接";
                connectBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
                readSerialLoop();
            } catch (error) { console.error(error); }
        });

        async function readSerialLoop() {
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();
            let buffer = "";
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value) {
                    buffer += value;
                    
                    if (currentMode === 'single') {
                        // 單塊地板模式：直接偵測字串，不需要換行符號
                        let upperBuf = buffer.toUpperCase();
                        if (upperBuf.includes("HIGHT") || upperBuf.includes("HIGH")) {
                            processMicrobitData("High");
                            buffer = ""; // 讀取後清空緩衝區
                        } else if (upperBuf.includes("MED")) {
                            processMicrobitData("Med");
                            buffer = "";
                        } else if (upperBuf.includes("LOW")) {
                            processMicrobitData("Low");
                            buffer = "";
                        }
                        
                        // 避免緩衝區無限增長
                        if (buffer.length > 200) {
                            buffer = buffer.slice(-100);
                        }
                    } else {
                        // 天台模式：仍需換行符號分割資料 (X,Y,LEVEL\n)
                        let lines = buffer.split('\n');
                        buffer = lines.pop(); // 保留最後未完成的片段
                        for (let line of lines) {
                            if (line.trim() !== "") {
                                processMicrobitData(line.trim());
                            }
                        }
                    }
                }
            }
        }

        function processMicrobitData(dataString) {
            if (currentMode === 'roof') {
                // 原有天台模式處理 (格式: "X,Y,LEVEL")
                let parts = dataString.split(',');
                if (parts.length === 3) {
                    let x = parseInt(parts[0]), y = parseInt(parts[1]), level = parseInt(parts[2]);
                    if (x>=0 && x<10 && y>=0 && y<10 && level>=0 && level<=2) {
                        waterLevels[x][y] = level; 
                        updateUI(x, y);
                    }
                }
            } else if (currentMode === 'single') {
                // 單塊地板模式處理
                let signal = dataString.toUpperCase();
                
                if (signal === "LOW") {
                    singleTile.className = singleTile.className.replace(/level-\d/, 'level-0');
                    singleStatus.innerText = "訊號: Low (無積水)";
                    singleStatus.className = "w-full text-2xl font-mono font-bold text-slate-500 bg-slate-100 py-4 rounded-lg border border-slate-200 transition-colors duration-300";
                } else if (signal === "MED") {
                    singleTile.className = singleTile.className.replace(/level-\d/, 'level-1');
                    singleStatus.innerText = "訊號: Med (小量積水)";
                    singleStatus.className = "w-full text-2xl font-mono font-bold text-yellow-600 bg-yellow-50 py-4 rounded-lg border border-yellow-300 transition-colors duration-300";
                } else if (signal === "HIGHT" || signal === "HIGH") {
                    singleTile.className = singleTile.className.replace(/level-\d/, 'level-2');
                    singleStatus.innerText = "訊號: High (大量積水)";
                    singleStatus.className = "w-full text-2xl font-mono font-bold text-red-600 bg-red-50 py-4 rounded-lg border border-red-300 transition-colors duration-300";
                }
            }
        }

        initGrids();
    </script>
</body>
</html>
